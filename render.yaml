# Render.com deployment blueprint
# See: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: newsflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: NEWSAPI_KEY
        sync: false  # You'll set this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
